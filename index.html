<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault — Escape Room Chronicles</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;--bg2:#0f0f18;--bg3:#141422;--card:#12121e;--border:#2a2a45;
    --amber:#f5a623;--amber2:#e8891a;--gold:#ffd166;--red:#e63946;--green:#06d6a0;--blue:#4cc9f0;
    --text:#e8e8f0;--text2:#9090b0;--text3:#5a5a80;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

  @keyframes pulse-lock{0%,100%{filter:drop-shadow(0 0 14px rgba(245,166,35,.5))}50%{filter:drop-shadow(0 0 28px rgba(245,166,35,.95))}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

  /* ── LOADING / ERROR ── */
  #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:20px;}
  .spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-text{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;}
  #error-screen{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;padding:32px;}
  .error-icon{font-size:3rem;opacity:.5;}
  .error-title{font-family:'Cinzel',serif;color:var(--red);font-size:1.2rem;letter-spacing:.1em;}
  .error-msg{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text3);letter-spacing:.08em;text-align:center;line-height:1.8;max-width:480px;white-space:pre-line;}

  /* ── SETUP BANNER ── */
  #setup-banner{display:none;background:rgba(230,57,70,.08);border-bottom:1px solid rgba(230,57,70,.25);padding:10px 32px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--red);letter-spacing:.08em;line-height:1.8;}
  #setup-banner a{color:var(--amber);text-decoration:underline;}

  /* ── HEADER ── */
  #app{display:none;position:relative;z-index:1;}
  header{
    padding:52px 32px 44px;text-align:center;position:relative;overflow:hidden;
    background:radial-gradient(ellipse at 50% 0%,#1a1208 0%,#0d0a06 40%,#080808 100%);
    border-bottom:2px solid #3a2a0a;
  }
  /* Fondo atmosférico con viñeta */
  header::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%,rgba(120,80,10,.25) 0%,transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 50%,rgba(60,40,5,.15) 0%,transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 50%,rgba(60,40,5,.15) 0%,transparent 60%);
    pointer-events:none;
  }
  /* Línea dorada inferior */
  header::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent 0%,#8b6010 20%,#d4a017 50%,#8b6010 80%,transparent 100%);
  }

  /* Ornamentos laterales */
  .vault-icon{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
  .vault-ornament{font-size:1.1rem;opacity:.5;color:#c8922a;}
  .vault-glyph{font-size:1.8rem;filter:drop-shadow(0 0 8px rgba(200,140,30,.7));opacity:.8;}

  /* Título principal — efecto metálico tridimensional */
  h1{
    font-family:'Cinzel',serif;
    font-weight:900;
    font-size:clamp(2.4rem,6vw,4.2rem);
    letter-spacing:.2em;
    text-transform:uppercase;
    line-height:1;
    position:relative;
    display:inline-block;

    /* Gradiente cobre/bronce */
    background:linear-gradient(
      180deg,
      #f0d060 0%,
      #c8922a 18%,
      #f5c842 32%,
      #a06010 48%,
      #e8b030 58%,
      #7a4a08 72%,
      #d4950a 85%,
      #f0c840 100%
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;

    /* Sombras para efecto 3D forjado */
    filter:
      drop-shadow(0 1px 0 rgba(0,0,0,.9))
      drop-shadow(0 2px 0 rgba(0,0,0,.8))
      drop-shadow(0 3px 0 rgba(0,0,0,.7))
      drop-shadow(0 4px 0 rgba(0,0,0,.5))
      drop-shadow(0 8px 20px rgba(0,0,0,.8))
      drop-shadow(0 0 40px rgba(200,140,20,.2));
  }

  /* Marco ornamental alrededor del título */
  .vault-frame{
    display:inline-block;position:relative;padding:10px 32px 14px;
    border-top:1px solid rgba(200,140,30,.3);
    border-bottom:1px solid rgba(200,140,30,.3);
  }
  .vault-frame::before,.vault-frame::after{
    content:'⚙';position:absolute;top:50%;transform:translateY(-50%);
    font-size:1.4rem;color:#7a5010;opacity:.6;
    filter:drop-shadow(0 0 6px rgba(200,140,20,.4));
  }
  .vault-frame::before{left:-8px;}
  .vault-frame::after{right:-8px;}

  /* Subtítulo */
  .vault-sub-line{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;}
  .vault-dash{
    height:1px;flex:1;max-width:90px;
    background:linear-gradient(90deg,transparent,rgba(180,120,20,.5));
  }
  .vault-dash.right{background:linear-gradient(90deg,rgba(180,120,20,.5),transparent);}
  .vault-subtitle{
    font-family:'Share Tech Mono',monospace;
    color:#8a6820;font-size:.68rem;letter-spacing:.32em;text-transform:uppercase;
    text-shadow:0 0 12px rgba(180,120,10,.3);
  }
  .vault-byline{
    font-family:'Share Tech Mono',monospace;color:#4a3a18;
    font-size:.58rem;letter-spacing:.18em;margin-top:10px;
  }

  .updated-badge{position:absolute;top:20px;right:24px;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text3);letter-spacing:.08em;border:1px solid var(--border);padding:5px 12px;line-height:1.6;text-align:right;}
  .updated-badge span{color:var(--green);display:block;}

  /* ── STATS ── */
  .stats-bar{padding:22px 32px;background:var(--bg2);border-bottom:1px solid var(--border);}
  .stats-top{display:flex;gap:0;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
  .stat-item{text-align:center;padding:10px 26px;position:relative;}
  .stat-item:not(:last-child)::after{content:'|';position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--border);}
  .stat-num{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:700;color:var(--amber);line-height:1;display:block;}
  .stat-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;display:block;}

  /* Barra de progreso */
  .progress-wrap{max-width:680px;margin:0 auto 16px;}
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .progress-title{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}
  .progress-pct{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--amber);}
  .progress-track{height:6px;background:rgba(255,255,255,.05);border:1px solid var(--border);position:relative;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--gold));transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative;}
  .progress-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:white;opacity:.6;filter:blur(1px);}

  /* Insights row */
  .stats-insights{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
  .insight-pill{font-family:'Share Tech Mono',monospace;font-size:.62rem;padding:5px 12px;border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--text3);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .insight-pill .ip-icon{font-size:.85rem;}
  .insight-pill .ip-val{color:var(--text);font-weight:700;letter-spacing:.04em;}
  .insight-pill.highlight{border-color:rgba(245,166,35,.2);background:rgba(245,166,35,.04);}
  .insight-pill.highlight .ip-val{color:var(--amber);}

  /* ── TABS ── */
  .tabs-container{display:flex;justify-content:center;padding:26px 32px 0;gap:4px;max-width:1400px;margin:0 auto;}
  .tab{font-family:'Cinzel',serif;font-weight:600;font-size:.82rem;letter-spacing:.12em;padding:11px 28px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;text-transform:uppercase;}
  .tab:hover{color:var(--amber);border-color:rgba(245,166,35,.3);}
  .tab.active{background:var(--card);border-color:var(--amber);color:var(--amber);border-bottom-color:var(--card);z-index:1;}
  .tab .count-badge{font-family:'Share Tech Mono',monospace;font-size:.62rem;background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.25);padding:1px 6px;border-radius:20px;margin-left:7px;vertical-align:middle;}

  /* ── CONTENT / PANEL ── */
  .content{position:relative;z-index:1;padding:0 32px 56px;max-width:1400px;margin:0 auto;}
  .panel{background:var(--card);border:1px solid var(--border);border-top:none;padding:22px;margin-bottom:20px;}

  /* ── FILTERS ── */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .filter-label{font-family:'Share Tech Mono',monospace;font-size:.67rem;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;}
  .filter-select,.filter-input{font-family:'Rajdhani',sans-serif;font-size:.86rem;font-weight:500;background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:7px 12px;outline:none;cursor:pointer;transition:border-color .2s;appearance:none;-webkit-appearance:none;min-width:110px;}
  .filter-select:focus,.filter-input:focus{border-color:rgba(245,166,35,.45);}
  .filter-input{min-width:190px;}
  .filter-input::placeholder{color:var(--text3);}
  .clear-btn{font-family:'Share Tech Mono',monospace;font-size:.67rem;letter-spacing:.08em;background:transparent;color:var(--text3);border:1px solid var(--border);padding:7px 13px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
  .clear-btn:hover{color:var(--red);border-color:var(--red);}
  .sort-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center;}
  .sort-btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.08em;background:transparent;color:var(--text3);border:1px solid var(--border);padding:5px 11px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
  .sort-btn:hover,.sort-btn.active{color:var(--amber);border-color:rgba(245,166,35,.4);}
  .divider-line{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:16px 0;}
  .result-info{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3);letter-spacing:.08em;margin-bottom:14px;}

  /* ── CARDS ── */
  .rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:14px;}
  .room-card{background:var(--bg2);border:1px solid var(--border);padding:18px;position:relative;transition:transform .2s,border-color .2s,box-shadow .2s;overflow:hidden;animation:fadeUp .3s ease both;display:flex;flex-direction:column;}
  .room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);opacity:0;transition:opacity .2s;}
  .room-card:hover{border-color:rgba(245,166,35,.35);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.45);}
  .room-card:hover::before{opacity:1;}
  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .room-name{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--text);line-height:1.2;flex:1;}
  .rating-badge{font-family:'Share Tech Mono',monospace;font-size:.85rem;padding:3px 9px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
  .rating-high{background:rgba(6,214,160,.1);color:var(--green);border:1px solid rgba(6,214,160,.28);}
  .rating-mid{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.28);}
  .rating-low{background:rgba(230,57,70,.1);color:var(--red);border:1px solid rgba(230,57,70,.28);}
  .empresa{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3);letter-spacing:.07em;margin-bottom:9px;text-transform:uppercase;}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
  .tag{font-family:'Rajdhani',sans-serif;font-size:.73rem;font-weight:600;padding:2px 7px;border-radius:2px;}
  .tag-city{background:rgba(76,201,240,.08);color:var(--blue);border:1px solid rgba(76,201,240,.18);}
  .tag-tema{background:rgba(123,45,139,.12);color:#c084fc;border:1px solid rgba(123,45,139,.25);}
  .tag-tipo{background:rgba(245,166,35,.07);color:var(--amber2);border:1px solid rgba(245,166,35,.14);}
  .card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
  .meta-item{display:flex;flex-direction:column;}
  .meta-key{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
  .meta-val{font-family:'Rajdhani',sans-serif;font-size:.86rem;font-weight:600;color:var(--text2);margin-top:2px;}
  .diff-alta{color:var(--red);}.diff-media-alta{color:var(--amber);}.diff-media{color:var(--green);}.diff-baja{color:var(--blue);}
  .card-desc{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:400;color:var(--text3);line-height:1.55;margin-bottom:12px;padding:10px 12px;border-left:2px solid rgba(245,166,35,.2);background:rgba(255,255,255,.02);font-style:italic;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid rgba(255,255,255,.04);margin-top:auto;}
  .web-link{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text3);text-decoration:none;letter-spacing:.07em;text-transform:uppercase;transition:color .2s;}
  .web-link:hover{color:var(--amber);}.web-link::before{content:'→ ';}
  .rank-badge{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;padding:2px 9px;background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.18);color:var(--amber);}
  .rank-1{background:rgba(255,209,102,.12);border-color:var(--gold);color:var(--gold);}
  .group-score{margin-top:10px;padding:9px 13px;background:rgba(245,166,35,.04);border:1px solid rgba(245,166,35,.14);display:flex;align-items:center;justify-content:space-between;}
  .group-score-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
  .group-score-val{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;color:var(--amber);}

  /* ── LOGO CIRCULAR (favicon) ── */
  .card-logo{width:42px;height:42px;border-radius:50%;background:rgba(245,166,35,.06);border:2px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:5px;box-shadow:0 0 10px rgba(245,166,35,.08);}
  .card-logo img{width:100%;height:100%;object-fit:contain;}
  .card-logo .logo-emoji{font-size:1.2rem;line-height:1;}
  .rv-logo{width:38px;height:38px;border-radius:50%;background:rgba(245,166,35,.06);border:2px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px;box-shadow:0 0 8px rgba(245,166,35,.08);}
  .rv-logo img{width:100%;height:100%;object-fit:contain;}

  /* ── TERPECA BADGE ── */
  .terpeca-badge{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;cursor:default;}
  .terpeca-img{width:48px;height:48px;object-fit:contain;display:block;}
  .terpeca-pos{
    font-family:'Cinzel',serif;font-size:.65rem;font-weight:900;
    color:var(--amber);letter-spacing:.06em;
    text-shadow:0 0 8px rgba(245,166,35,.4);
    line-height:1;
  }

  /* ── FAV BUTTON ── */
  .fav-btn{background:transparent;border:none;padding:0;cursor:pointer;line-height:1;transition:all .2s;flex-shrink:0;color:var(--border);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .fav-btn:hover{transform:scale(1.1);}
  .fav-btn:hover .fav-heart{color:rgba(230,57,70,.7);}
  .fav-btn.active .fav-heart{color:var(--red);animation:pop .25s ease;}
  .fav-heart{font-size:1.5rem;line-height:1;color:var(--border);transition:color .2s;}
  .fav-likes{font-family:'Share Tech Mono',monospace;font-size:.68rem;font-weight:700;color:var(--text);line-height:1;min-width:16px;text-align:center;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:1px 5px;border-radius:10px;}
  .fav-btn.active .fav-likes{color:var(--red);border-color:rgba(230,57,70,.4);background:rgba(230,57,70,.08);}
  .fav-btn:hover .fav-likes{border-color:rgba(230,57,70,.3);}
  .room-card.is-fav{border-color:rgba(230,57,70,.3);}
  .room-card.is-fav::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
  .sort-btn.fav-filter{border-color:rgba(230,57,70,.3);color:var(--red);}
  .sort-btn.fav-filter.active{background:rgba(230,57,70,.08);border-color:var(--red);}

  /* ── REVIEW LIST (Hechos) ── */
  .reviews-list{display:flex;flex-direction:column;gap:2px;}
  .review-row{display:grid;grid-template-columns:60px 1fr 1fr;gap:0;border:1px solid var(--border);background:var(--bg2);animation:fadeUp .3s ease both;transition:border-color .2s;}
  .review-row:hover{border-color:rgba(245,166,35,.3);}

  /* Left: rank number */
  .rv-rank{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;border-right:1px solid var(--border);background:rgba(245,166,35,.03);}
  .rv-rank-num{font-family:'Cinzel',serif;font-weight:900;font-size:1.6rem;color:var(--text3);line-height:1;}
  .rv-rank-num.gold{color:var(--gold);} .rv-rank-num.silver{color:#c0c0c0;} .rv-rank-num.bronze{color:#cd7f32;}
  .rv-rank-emoji{font-size:1.4rem;line-height:1;}

  /* Center: info */
  .rv-info{padding:18px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  .rv-title-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .rv-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.2;}
  .rv-empresa{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;}
  .rv-tags{display:flex;gap:5px;flex-wrap:wrap;}
  .rv-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:2px;}
  .rv-meta-item{display:flex;flex-direction:column;}
  .rv-scores{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
  .rv-score-pill{font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:4px 10px;border-radius:2px;white-space:nowrap;}
  .rv-score-escapistas{background:rgba(76,201,240,.08);color:var(--blue);border:1px solid rgba(76,201,240,.18);}
  .rv-score-grupo{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.28);font-size:.82rem;font-weight:700;}
  .rv-score-comunidad{background:rgba(123,45,139,.1);color:#c084fc;border:1px solid rgba(123,45,139,.25);}

  /* Right: opinion + vote */
  .rv-opinion{padding:18px 20px;display:flex;flex-direction:column;gap:12px;}
  .rv-opinion-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
  .rv-opinion-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .rv-opinion-text{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:400;color:var(--text2);line-height:1.7;flex:1;}
  .rv-opinion-text.empty{color:var(--text3);font-style:italic;font-size:.85rem;}
  .rv-web{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text3);text-decoration:none;letter-spacing:.07em;text-transform:uppercase;transition:color .2s;margin-top:auto;align-self:flex-start;}
  .rv-web:hover{color:var(--amber);} .rv-web::before{content:'→ ';}

  /* ── Category stars ── */
  .rv-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:4px;}
  .rv-cat{display:flex;flex-direction:column;gap:3px;}
  .rv-cat-label{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
  .rv-cat-stars{display:flex;gap:1px;align-items:center;}
  .rv-cat-star{font-size:1rem;line-height:1;}
  .rv-cat-star.on{color:var(--amber);}
  .rv-cat-star.half{background:linear-gradient(90deg,var(--amber) 50%,var(--border) 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .rv-cat-star.off{color:var(--border);}
  .rv-cat-val{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text2);margin-left:5px;}

  @media(max-width:900px){
    .review-row{grid-template-columns:50px 1fr;}
    .rv-opinion{grid-column:1/-1;border-top:1px solid var(--border);border-right:none;}
    .rv-info{border-right:none;}
  }
  @media(max-width:640px){
    .review-row{grid-template-columns:1fr;}
    .rv-rank{flex-direction:row;gap:10px;padding:12px 16px;border-right:none;border-bottom:1px solid var(--border);}
    .rv-info{border-right:none;padding:14px 16px;}
    .rv-opinion{padding:14px 16px;}
  }

  /* ── VOTE SECTION ── */
  .vote-section{margin-top:10px;padding:11px 13px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);}
  .vote-section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .vote-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
  .vote-community{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3);text-align:right;}
  .vote-community strong{color:var(--amber);font-size:.85rem;}
  /* ── Half-star widget ── */
  .stars{display:flex;gap:2px;cursor:pointer;user-select:none;}
  .star-wrap{position:relative;width:1.5rem;height:1.5rem;flex-shrink:0;}
  .star-bg{position:absolute;inset:0;font-size:1.35rem;line-height:1.5rem;color:var(--border);pointer-events:none;transition:color .12s;}
  .star-fg{position:absolute;inset:0;font-size:1.35rem;line-height:1.5rem;color:var(--amber);overflow:hidden;width:0%;pointer-events:none;transition:width .12s,color .12s;white-space:nowrap;}
  .star-fg.preview{color:var(--gold);}
  .half-l,.half-r{position:absolute;top:0;height:100%;width:50%;z-index:2;}
  .half-l{left:0;}.half-r{right:0;}
  .vote-status{font-family:'Share Tech Mono',monospace;font-size:.6rem;margin-top:6px;text-align:right;min-height:14px;}
  .vote-status.my-vote{color:var(--green);}
  .vote-status.saving{color:var(--text3);}
  .vote-status.error{color:var(--red);}
  .vote-no-firebase{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--text3);font-style:italic;text-align:center;padding:4px 0;}

  /* ── RANKING TABLE ── */
  .empty-state{text-align:center;padding:56px 20px;color:var(--text3);grid-column:1/-1;}
  .empty-state .lock{font-size:2.8rem;margin-bottom:14px;opacity:.25;}
  .empty-state p{font-family:'Share Tech Mono',monospace;font-size:.75rem;letter-spacing:.14em;}
  .ranking-table{width:100%;border-collapse:collapse;margin-top:16px;}
  .ranking-table th{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.13em;color:var(--text3);text-transform:uppercase;padding:9px 13px;border-bottom:1px solid var(--border);text-align:left;font-weight:normal;}
  .ranking-table td{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:500;padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2);}
  .ranking-table tr:hover td{background:rgba(255,255,255,.02);}
  .rank-pos{font-family:'Cinzel',serif;font-weight:700;font-size:1.05rem;color:var(--text3);}
  .rank-pos.gold{color:var(--gold);}.rank-pos.silver{color:#c0c0c0;}.rank-pos.bronze{color:#cd7f32;}

  @media(max-width:640px){
    header{padding:28px 18px 60px;}.content{padding:0 14px 40px;}
    .tabs-container{padding:18px 14px 0;gap:0;}.tab{padding:9px 14px;font-size:.72rem;}
    .panel{padding:14px;}.rooms-grid{grid-template-columns:1fr;}
    .updated-badge{top:auto;bottom:16px;right:50%;transform:translateX(50%);text-align:center;}
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Cargando datos...</div>
</div>

<div id="error-screen">
  <div class="error-icon">🔓</div>
  <div class="error-title">Error al cargar datos</div>
  <div class="error-msg" id="error-msg"></div>
</div>

<div id="app">

  <!-- Banner si Firebase no está configurado -->
  <div id="setup-banner">
    ⚠ Las votaciones no están activas — configura Firebase en index.html para habilitarlas.
    <a href="https://github.com/TU_USUARIO/TU_REPO#-configurar-votaciones-con-firebase" target="_blank">Ver instrucciones →</a>
  </div>

  <header>
    <div class="updated-badge">DATOS ACTUALIZADOS<span id="update-date"></span></div>
    <div class="vault-icon">
      <span class="vault-ornament">⚙ ✦ ⚙</span>
      <span class="vault-glyph">🔐</span>
      <span class="vault-ornament">⚙ ✦ ⚙</span>
    </div>
    <div class="vault-frame">
      <h1>THE VAULT</h1>
    </div>
    <div class="vault-sub-line">
      <div class="vault-dash"></div>
      <span class="vault-subtitle">Escape Room Chronicles</span>
      <div class="vault-dash right"></div>
    </div>
  </header>

  <div class="stats-bar" id="stats-bar"></div>

  <div style="max-width:1400px;margin:0 auto;padding:0 32px;">
    <div class="tabs-container">
      <button class="tab active" id="tab-pend"  onclick="switchTab('pendientes')">🔒 Pendientes <span class="count-badge" id="badge-pend">0</span></button>
      <button class="tab"        id="tab-hecho" onclick="switchTab('hechos')">✅ Hechos <span class="count-badge" id="badge-hecho">0</span></button>
      <button class="tab"        id="tab-rank"  onclick="switchTab('ranking')">🏆 Ranking</button>
    </div>
  </div>

  <div class="content">
    <!-- PENDIENTES -->
    <div id="panel-pendientes" class="panel">
      <div class="filters">
        <span class="filter-label">Filtrar:</span>
        <input type="text" class="filter-input" id="search-pend" placeholder="🔍  Nombre, empresa, temática..." oninput="renderPendientes()">
        <select class="filter-select" id="filter-ciudad-pend" onchange="renderPendientes()"><option value="">Todas las ciudades</option></select>
        <select class="filter-select" id="filter-dif-pend"   onchange="renderPendientes()"><option value="">Dificultad</option></select>
        <select class="filter-select" id="filter-tipo-pend"  onchange="renderPendientes()"><option value="">Tipo</option></select>
        <button class="clear-btn" onclick="clearFilters('pend')">✕ Limpiar</button>
      </div>
      <div class="sort-row">
        <span class="filter-label">Ordenar:</span>
        <button class="sort-btn active" id="sort-pend-rating" onclick="setSortPend('rating')">★ Rating</button>
        <button class="sort-btn" id="sort-pend-name" onclick="setSortPend('name')">A→Z</button>
        <button class="sort-btn" id="sort-pend-dur"  onclick="setSortPend('dur')">⏱ Duración</button>
        <button class="sort-btn" id="sort-pend-dif"  onclick="setSortPend('dif')">⚠ Dificultad</button>
        <button class="sort-btn fav-filter" id="sort-pend-fav" onclick="toggleFavFilter()" title="Mostrar solo favoritos">♥ Favoritos <span id="fav-count"></span></button>
      </div>
      <div class="divider-line"></div>
      <div class="result-info" id="result-info-pend"></div>
      <div class="rooms-grid"  id="grid-pendientes"></div>
    </div>

    <!-- HECHOS -->
    <div id="panel-hechos" class="panel" style="display:none">
      <div class="filters">
        <span class="filter-label">Filtrar:</span>
        <input type="text" class="filter-input" id="search-hecho" placeholder="🔍  Nombre, empresa..." oninput="renderHechos()">
        <select class="filter-select" id="filter-dif-hecho" onchange="renderHechos()"><option value="">Dificultad</option></select>
        <button class="clear-btn" onclick="clearFilters('hecho')">✕ Limpiar</button>
      </div>
      <div class="divider-line" style="margin-top:18px"></div>
      <div class="result-info" id="result-info-hecho"></div>
      <div class="reviews-list" id="grid-hechos"></div>
    </div>

    <!-- RANKING -->
    <div id="panel-ranking" class="panel" style="display:none">
      <table class="ranking-table" id="ranking-table"></table>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  🔥 CONFIGURACIÓN FIREBASE
//  Rellena con tus datos de Firebase Realtime Database.
//  Deja FIREBASE_URL = '' si no quieres usar votaciones.
// ════════════════════════════════════════════════════════════
const FIREBASE_URL = 'https://scapesrooms-default-rtdb.europe-west1.firebasedatabase.app/';   // ← Pega aquí tu URL, ej: 'https://mi-proyecto-default-rtdb.europe-west1.firebasedatabase.app'
// ════════════════════════════════════════════════════════════

const FIREBASE_ENABLED = FIREBASE_URL.trim() !== '';

// ID único por navegador/usuario (se genera una sola vez y se guarda)
let USER_ID = localStorage.getItem('er_uid');
if (!USER_ID) {
  USER_ID = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem('er_uid', USER_ID);
}

// Cache de votos: { roomSlug: { userId: stars, ... }, ... }
let votesCache = {};

let PENDIENTES = [], HECHOS = [], sortPend = 'rating';

// ── Utilidades ────────────────────────────────────────────────────────────────
function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
}

function rc(r){const n=parseFloat(r);return n>=9?'rating-high':n>=8?'rating-mid':'rating-low';}
function dc(d){if(!d)return'';const l=d.toLowerCase();return l==='alta'?'diff-alta':l.includes('media-alta')||l.includes('media alta')?'diff-media-alta':l==='media'?'diff-media':'diff-baja';}
function do_(d){return{'Alta':4,'Media-Alta':3,'Media':2,'Baja':1}[d]||2;}

// ── Firebase REST API ─────────────────────────────────────────────────────────
async function fbGet(path) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`);
  if (!r.ok) throw new Error(`Firebase GET error: ${r.status}`);
  return r.json();
}

async function fbPut(path, value) {
  const r = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'PUT',
    body: JSON.stringify(value),
    headers: {'Content-Type': 'application/json'}
  });
  if (!r.ok) throw new Error(`Firebase PUT error: ${r.status}`);
  return r.json();
}

// Calcular media y número de votos para un slug
function voteStats(slug) {
  const roomVotes = votesCache[slug] || {};
  const vals = Object.values(roomVotes).filter(v => v > 0);
  if (!vals.length) return { avg: null, count: 0, myVote: 0 };
  const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
  return { avg: Math.round(avg * 10) / 10, count: vals.length, myVote: roomVotes[USER_ID] || 0 };
}

// ── Half-star widget ──────────────────────────────────────────────────────────
// Cada estrella tiene mitad izquierda (valor N-0.5) y mitad derecha (valor N)
// Los valores guardados en Firebase son 0.5 a 5.0 (× 2 = nota 1-10)

function buildStarsHtml(slug, myVote) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const fillPct = Math.min(Math.max((myVote - (i - 1)) * 100, 0), 100);
    html += `<div class="star-wrap">
      <div class="star-bg">★</div>
      <div class="star-fg" id="sfg_${slug}_${i}" style="width:${fillPct}%">★</div>
      <div class="half-l" onmouseenter="previewStars('${slug}',${i - 0.5})" onmouseleave="unpreviewStars('${slug}',${myVote})" onclick="castVote('${slug}',${i - 0.5})"></div>
      <div class="half-r" onmouseenter="previewStars('${slug}',${i})"       onmouseleave="unpreviewStars('${slug}',${myVote})" onclick="castVote('${slug}',${i})"></div>
    </div>`;
  }
  return html;
}

function previewStars(slug, val) {
  for (let i = 1; i <= 5; i++) {
    const fg = document.getElementById(`sfg_${slug}_${i}`);
    if (!fg) continue;
    const fillPct = Math.min(Math.max((val - (i - 1)) * 100, 0), 100);
    fg.style.width = fillPct + '%';
    fg.classList.add('preview');
  }
  const statusEl = document.getElementById('vstatus_' + slug);
  if (statusEl && statusEl.dataset.saved !== '1') {
    statusEl.textContent = `${(val * 2 % 1 === 0 ? val * 2 : (val * 2).toFixed(1))}/10`;
    statusEl.className = 'vote-status saving';
  }
}

function unpreviewStars(slug, myVote) {
  for (let i = 1; i <= 5; i++) {
    const fg = document.getElementById(`sfg_${slug}_${i}`);
    if (!fg) continue;
    const fillPct = Math.min(Math.max((myVote - (i - 1)) * 100, 0), 100);
    fg.style.width = fillPct + '%';
    fg.classList.remove('preview');
  }
  const statusEl = document.getElementById('vstatus_' + slug);
  if (statusEl && statusEl.dataset.saved !== '1') {
    statusEl.textContent = myVote > 0 ? `Tu nota: ${myVote * 2}/10` : 'Haz clic para votar';
    statusEl.className = myVote > 0 ? 'vote-status my-vote' : 'vote-status';
  }
}

function communityHtml(avg, count) {
  if (!FIREBASE_ENABLED) return '';
  if (count === 0) return 'sin votos aún';
  const score = (avg * 2).toFixed(1);
  return `<strong>${score}</strong>/10 &nbsp;·&nbsp; ${count} voto${count !== 1 ? 's' : ''}`;
}

function voteWidget(slug) {
  if (!FIREBASE_ENABLED) {
    return `<div class="vote-section"><div class="vote-no-firebase">Votaciones no configuradas</div></div>`;
  }
  const { avg, count, myVote } = voteStats(slug);
  const statusText  = myVote > 0 ? `Tu nota: ${myVote * 2}/10` : 'Haz clic para votar';
  const statusClass = myVote > 0 ? 'my-vote' : '';

  return `<div class="vote-section" id="vs_${slug}">
    <div class="vote-section-top">
      <div>
        <div class="vote-label">Tu valoración</div>
        <div class="stars" id="stars_${slug}">${buildStarsHtml(slug, myVote)}</div>
      </div>
      <div class="vote-community" id="comm_${slug}">
        <div class="vote-label" style="text-align:right">Comunidad</div>
        ${communityHtml(avg, count)}
      </div>
    </div>
    <div class="vote-status ${statusClass}" id="vstatus_${slug}" data-saved="${myVote > 0 ? 1 : 0}">${statusText}</div>
  </div>`;
}

async function castVote(slug, stars) {
  if (!FIREBASE_ENABLED) return;
  if (!votesCache[slug]) votesCache[slug] = {};
  votesCache[slug][USER_ID] = stars;

  // Update stars visually
  for (let i = 1; i <= 5; i++) {
    const fg = document.getElementById(`sfg_${slug}_${i}`);
    if (fg) { fg.style.width = Math.min(Math.max((stars-(i-1))*100,0),100)+'%'; fg.classList.remove('preview'); }
  }

  const statusEl = document.getElementById('vstatus_' + slug);
  const commEl   = document.getElementById('comm_'    + slug);
  if (statusEl) { statusEl.textContent = 'Guardando...'; statusEl.className = 'vote-status saving'; statusEl.dataset.saved = '0'; }

  try {
    await fbPut(`votes/${slug}/${USER_ID}`, stars);
    const { avg, count } = voteStats(slug);
    if (statusEl) { statusEl.textContent = `Tu nota: ${stars * 2}/10 ✓`; statusEl.className = 'vote-status my-vote'; statusEl.dataset.saved = '1'; }
    if (commEl)   { commEl.innerHTML = `<div class="vote-label" style="text-align:right">Comunidad</div>${communityHtml(avg, count)}`; }
    // Re-bind mouseleave con el nuevo myVote
    const starsEl = document.getElementById('stars_' + slug);
    if (starsEl) {
      starsEl.querySelectorAll('.half-l,.half-r').forEach(el => {
        const v = parseFloat(el.getAttribute('onmouseleave').match(/[\d.]+/g).pop());
        el.setAttribute('onmouseleave', `unpreviewStars('${slug}',${stars})`);
      });
    }
  } catch(e) {
    if (statusEl) { statusEl.textContent = 'Error al guardar :('; statusEl.className = 'vote-status error'; }
  }
}

// Cargar todos los votos desde Firebase de una sola vez
async function loadVotes() {
  if (!FIREBASE_ENABLED) return;
  try {
    const data = await fbGet('votes');
    if (data) votesCache = data;
  } catch(e) {
    console.warn('No se pudieron cargar los votos de Firebase:', e.message);
  }
}

// ── Cargar data.json ──────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('data.json?v=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status} — no se encontró data.json`);
    const d = await r.json();
    PENDIENTES = d.pendientes || [];
    HECHOS     = d.hechos     || [];
    const lastMod = r.headers.get('last-modified');
    if (lastMod) {
      document.getElementById('update-date').textContent =
        new Date(lastMod).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
    }
    // Cargar votos primero (bloquea hasta tener datos para el ranking)
    await loadVotes();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (!FIREBASE_ENABLED) document.getElementById('setup-banner').style.display = 'block';

    populateFilters(); renderStats(); renderPendientes(); renderHechos(); renderRanking();
    updateFavCount();

    // Cargar likes DESPUÉS de pintar la UI y actualizar contadores
    loadLikes().then(() => refreshAllLikeCounts());
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    const es = document.getElementById('error-screen');
    es.style.display = 'flex';
    document.getElementById('error-msg').textContent =
      'No se pudo cargar data.json.\n' + err.message +
      '\n\nAsegúrate de que el archivo existe y la GitHub Action se ejecutó correctamente.';
  }
}

loadData();

// ── Filtros y UI ──────────────────────────────────────────────────────────────
function populateFilters() {
  const fill = (id, vals, ph) => {
    const s = document.getElementById(id);
    s.innerHTML = `<option value="">${ph}</option>`;
    vals.forEach(v => s.appendChild(new Option(v, v)));
  };
  fill('filter-ciudad-pend', [...new Set(PENDIENTES.map(p=>p.ciudad).filter(Boolean))].sort(), 'Todas las ciudades');
  fill('filter-dif-pend',    [...new Set(PENDIENTES.map(p=>p.dificultad).filter(Boolean))].sort(), 'Dificultad');
  fill('filter-tipo-pend',   [...new Set(PENDIENTES.map(p=>p.tipo).filter(Boolean))].sort(), 'Tipo');
  fill('filter-dif-hecho',   [...new Set(HECHOS.map(h=>h.dificultad).filter(Boolean))].sort(), 'Dificultad');
  document.getElementById('badge-pend').textContent  = PENDIENTES.length;
  document.getElementById('badge-hecho').textContent = HECHOS.length;
}

function renderStats() {
  const total = HECHOS.length + PENDIENTES.length;
  const pct   = total > 0 ? Math.round((HECHOS.length / total) * 100) : 0;

  // Media grupo (solo los que tienen valoración)
  const conVal = HECHOS.filter(h => parseFloat(h.valoracion) > 0);
  const avgGrupo = conVal.length
    ? (conVal.reduce((s,h) => s + parseFloat(h.valoracion), 0) / conVal.length).toFixed(1) : '—';

  // Horas jugadas (hechos)
  const minsJugados = HECHOS.reduce((s,h) => s + (parseInt(h.duracion) || 0), 0);
  const hrsJugados  = minsJugados >= 60
    ? `${Math.floor(minsJugados/60)}h ${minsJugados%60 > 0 ? minsJugados%60+'m' : ''}`
    : `${minsJugados}m`;

  // Empresa más visitada
  const empCount = {};
  HECHOS.forEach(h => { if (h.empresa) empCount[h.empresa] = (empCount[h.empresa]||0)+1; });
  const topEmp = Object.entries(empCount).sort((a,b)=>b[1]-a[1])[0];

  // Ciudad más visitada
  const cityCount = {};
  HECHOS.forEach(h => { if (h.ciudad) cityCount[h.ciudad] = (cityCount[h.ciudad]||0)+1; });
  const topCity = Object.entries(cityCount).sort((a,b)=>b[1]-a[1])[0];

  // Mejor escape (mayor valoracion grupo)
  const mejor = HECHOS.filter(h=>parseFloat(h.valoracion)>0)
    .sort((a,b)=>parseFloat(b.valoracion)-parseFloat(a.valoracion))[0];

  // Temática favorita
  const temaCount = {};
  HECHOS.forEach(h => { if (h.tematica) temaCount[h.tematica] = (temaCount[h.tematica]||0)+1; });
  const topTema = Object.entries(temaCount).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('stats-bar').innerHTML = `
    <div class="stats-top">
      <div class="stat-item"><span class="stat-num">${HECHOS.length}</span><span class="stat-label">Completados</span></div>
      <div class="stat-item"><span class="stat-num">${PENDIENTES.length}</span><span class="stat-label">Pendientes</span></div>
      <div class="stat-item"><span class="stat-num">${total}</span><span class="stat-label">Total</span></div>
      <div class="stat-item"><span class="stat-num">${avgGrupo}</span><span class="stat-label">Media grupo</span></div>
      <div class="stat-item"><span class="stat-num">${hrsJugados}</span><span class="stat-label">Horas jugadas</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-title">Progreso de la lista</span>
        <span class="progress-pct">${pct}% completado</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="stats-insights">
      ${mejor    ? `<div class="insight-pill highlight"><span class="ip-icon">🥇</span><span>Mejor escape</span><span class="ip-val">${mejor.nombre}</span><span style="opacity:.4">${mejor.valoracion}/10</span></div>` : ''}
      ${topEmp   ? `<div class="insight-pill"><span class="ip-icon">🏢</span><span>Empresa top</span><span class="ip-val">${topEmp[0]}</span><span style="opacity:.4">${topEmp[1]}×</span></div>` : ''}
      ${topCity  ? `<div class="insight-pill"><span class="ip-icon">📍</span><span>Ciudad top</span><span class="ip-val">${topCity[0]}</span><span style="opacity:.4">${topCity[1]}×</span></div>` : ''}
      ${topTema  ? `<div class="insight-pill"><span class="ip-icon">🎭</span><span>Temática top</span><span class="ip-val">${topTema[0]}</span><span style="opacity:.4">${topTema[1]}×</span></div>` : ''}
    </div>`;

  // Animar la barra con un pequeño delay para que se vea la transición
  requestAnimationFrame(() => {
    setTimeout(() => {
      const fill = document.getElementById('progress-fill');
      if (fill) fill.style.width = pct + '%';
    }, 150);
  });
}

function switchTab(t) {
  ['pendientes','hechos','ranking'].forEach(x => {
    document.getElementById('panel-' + x).style.display = x === t ? 'block' : 'none';
    const id = x==='pendientes'?'pend':x==='hechos'?'hecho':'rank';
    document.getElementById('tab-' + id).classList.toggle('active', x === t);
  });
}

function setSortPend(s) {
  sortPend = s;
  document.querySelectorAll('[id^="sort-pend-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-pend-' + s).classList.add('active');
  renderPendientes();
}

function clearFilters(w) {
  if (w === 'pend') {
    ['search-pend','filter-ciudad-pend','filter-dif-pend','filter-tipo-pend']
      .forEach(id => { document.getElementById(id).value = ''; });
    renderPendientes();
  } else {
    document.getElementById('search-hecho').value = '';
    document.getElementById('filter-dif-hecho').value = '';
    renderHechos();
  }
}

// ── Likes / Favoritos (Firebase) ─────────────────────────────────────────────
// likesCache: { slug: { userId: true, ... }, ... }
let likesCache = {};
// Local set para saber qué ha marcado ESTE usuario (también en localStorage como fallback)
let FAVS = new Set(JSON.parse(localStorage.getItem('er_favs') || '[]'));
let showOnlyFavs = false;

function likeCount(slug) {
  return Object.keys(likesCache[slug] || {}).length;
}

function iLiked(slug) {
  return FAVS.has(slug);
}

async function loadLikes() {
  if (!FIREBASE_ENABLED) return;
  try {
    const data = await fbGet('likes');
    if (data) likesCache = data;
    // Sincronizar FAVS con lo que haya en Firebase para este usuario
    FAVS = new Set(
      Object.entries(likesCache)
        .filter(([, users]) => users && users[USER_ID])
        .map(([slug]) => slug)
    );
    localStorage.setItem('er_favs', JSON.stringify([...FAVS]));
  } catch(e) {
    console.warn('No se pudieron cargar los likes:', e.message);
  }
}

// Refresca todos los contadores y estados de corazón ya renderizados en el DOM
function refreshAllLikeCounts() {
  document.querySelectorAll('.fav-btn[data-slug]').forEach(btn => {
    const slug = btn.dataset.slug;
    const likesEl = btn.querySelector('.fav-likes');
    if (likesEl) likesEl.textContent = likeCount(slug);
    const isActive = iLiked(slug);
    btn.classList.toggle('active', isActive);
    btn.closest('.room-card')?.classList.toggle('is-fav', isActive);
  });
  updateFavCount();
}

async function toggleFav(slug, btn) {
  const wasLiked = iLiked(slug);

  // Optimistic update local
  if (!likesCache[slug]) likesCache[slug] = {};
  if (wasLiked) {
    delete likesCache[slug][USER_ID];
    FAVS.delete(slug);
  } else {
    likesCache[slug][USER_ID] = true;
    FAVS.add(slug);
  }
  localStorage.setItem('er_favs', JSON.stringify([...FAVS]));

  // Actualizar UI inmediatamente
  const card = btn.closest('.room-card');
  const likesEl = btn.querySelector('.fav-likes');
  const count = likeCount(slug);
  btn.classList.toggle('active', !wasLiked);
  card.classList.toggle('is-fav', !wasLiked);
  if (likesEl) likesEl.textContent = count;

  updateFavCount();
  if (showOnlyFavs) renderPendientes();

  // Persistir en Firebase
  if (!FIREBASE_ENABLED) {
    console.warn('[Likes] Firebase no configurado — like guardado solo localmente');
    return;
  }

  const url = `${FIREBASE_URL.replace(/\/$/, '')}/likes/${slug}/${USER_ID}.json`;
  console.log(`[Likes] ${wasLiked ? 'DELETE' : 'PUT'} → ${url}`);
  try {
    const method = wasLiked ? 'DELETE' : 'PUT';
    const opts = { method };
    if (!wasLiked) {
      opts.body = 'true';
      opts.headers = { 'Content-Type': 'application/json' };
    }
    const r = await fetch(url, opts);
    if (!r.ok) {
      const body = await r.text();
      console.error(`[Likes] Error ${r.status}:`, body);
    } else {
      console.log(`[Likes] ✅ Guardado correctamente`);
    }
  } catch(e) {
    console.error('[Likes] Error de red:', e.message);
  }
}

function updateFavCount() {
  const el = document.getElementById('fav-count');
  if (el) el.textContent = FAVS.size > 0 ? `(${FAVS.size})` : '';
}

function toggleFavFilter() {
  showOnlyFavs = !showOnlyFavs;
  document.getElementById('sort-pend-fav').classList.toggle('active', showOnlyFavs);
  renderPendientes();
}

// ── Helper: estrellas de categoría (escala 0-10) ──────────────────────────────
function catStars(label, rawVal) {
  if (!rawVal) return '';
  const val = parseFloat(rawVal);
  if (isNaN(val)) return '';
  // Convertir a escala 0-5 para mostrar 5 estrellas
  const out_of_5 = val / 2;
  let stars = '';
  for (let i = 1; i <= 5; i++) {
    const diff = out_of_5 - (i - 1);
    if (diff >= 1)        stars += `<span class="rv-cat-star on">★</span>`;
    else if (diff >= 0.5) stars += `<span class="rv-cat-star half">★</span>`;
    else                  stars += `<span class="rv-cat-star off">★</span>`;
  }
  return `<div class="rv-cat">
    <div class="rv-cat-label">${label}</div>
    <div class="rv-cat-stars">${stars}<span class="rv-cat-val">${val}</span></div>
  </div>`;
}

function terpecaBadge(pos) {
  if (!pos) return '';
  return `<div class="terpeca-badge" title="Top ${pos} mundial TERPECA">
    <img class="terpeca-img" src="${TERPECA_LOGO}" alt="TERPECA">
    <span class="terpeca-pos">#${pos}</span>
  </div>`;
}

// ── Favicon logo ─────────────────────────────────────────────────────────────
function faviconHtml(webUrl, cssClass) {
  if (!webUrl) return `<div class="${cssClass}"><span class="logo-emoji">🔐</span></div>`;
  try {
    const domain = new URL(webUrl).hostname;
    const src = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
    return `<div class="${cssClass}"><img src="${src}" alt="" onerror="this.parentElement.innerHTML='<span class=\\'logo-emoji\\'>🔐</span>'"></div>`;
  } catch {
    return `<div class="${cssClass}"><span class="logo-emoji">🔐</span></div>`;
  }
}

// ── Templates de tarjetas ─────────────────────────────────────────────────────
function cardPend(p, i) {
  const slug = slugify(p.nombre);
  return `<div class="room-card" style="animation-delay:${i*.04}s">
  <div class="card-header">
    ${faviconHtml(p.web, 'card-logo')}
    <div class="room-name">${p.nombre}</div>
    ${terpecaBadge(p.terpeca)}
    <button class="fav-btn ${iLiked(slug) ? 'active' : ''}" data-slug="${slug}" onclick="toggleFav('${slug}',this)" title="Me apetece ir">
      <span class="fav-heart">♥</span>
      <span class="fav-likes">${likeCount(slug)}</span>
    </button>
    ${p.rating ? `<div class="rating-badge ${rc(p.rating)}">★ ${p.rating}</div>` : ''}
  </div>
  <div class="empresa">${p.empresa}</div>
  <div class="card-tags">
    ${p.ciudad   ? `<span class="tag tag-city">📍 ${p.ciudad}</span>` : ''}
    ${p.tematica ? `<span class="tag tag-tema">${p.tematica}</span>`  : ''}
  </div>
  ${p.tipo ? `<div class="card-tags"><span class="tag tag-tipo">${p.tipo}</span></div>` : ''}
  ${p.descripcion ? `<div class="card-desc">${p.descripcion}</div>` : ''}
  <div class="card-meta">
    ${p.duracion      ? `<div class="meta-item"><span class="meta-key">Duración</span><span class="meta-val">⏱ ${p.duracion} min</span></div>` : ''}
    ${p.dificultad    ? `<div class="meta-item"><span class="meta-key">Dificultad</span><span class="meta-val ${dc(p.dificultad)}">⚠ ${p.dificultad}</span></div>` : ''}
    ${p.max_personas  ? `<div class="meta-item"><span class="meta-key">Máx. jugadores</span><span class="meta-val">👥 ${p.max_personas}</span></div>` : ''}
  </div>
  ${voteWidget(slug)}
  <div class="card-footer">
    ${p.web ? `<a class="web-link" href="${p.web}" target="_blank">Ver web</a>` : '<span></span>'}
    <span class="tag" style="background:rgba(6,214,160,.05);color:#06d6a0;border:1px solid rgba(6,214,160,.18)">🔒 Pendiente</span>
  </div>
</div>`;
}

function cardHecho(h, rank) {
  const slug    = slugify(h.nombre);
  const medals  = ['gold','silver','bronze'];
  const emoji   = ['🥇','🥈','🥉'];
  const rankDisp = emoji[rank - 1]
    ? `<div class="rv-rank-emoji">${emoji[rank - 1]}</div>`
    : `<div class="rv-rank-num">#${rank}</div>`;

  const { avg, count } = voteStats(slug);
  const commPill = FIREBASE_ENABLED && count > 0
    ? `<span class="rv-score-pill rv-score-comunidad">🗳 ${(avg*2).toFixed(1)}/10 <span style="opacity:.6">(${count})</span></span>`
    : '';

  return `<div class="review-row" style="animation-delay:${(rank-1)*.05}s">

    <div class="rv-rank">
      ${rankDisp}
    </div>

    <div class="rv-info">
      <div class="rv-title-row">
        ${faviconHtml(h.web, 'rv-logo')}
        <div>
          <div class="rv-name">${h.nombre}</div>
          <div class="rv-empresa">${h.empresa}</div>
        </div>
        ${terpecaBadge(h.terpeca)}
      </div>
      <div class="rv-tags">
        ${h.ciudad   ? `<span class="tag tag-city">📍 ${h.ciudad}</span>` : ''}
        ${h.tematica ? `<span class="tag tag-tema">${h.tematica}</span>`  : ''}
        ${h.tipo     ? `<span class="tag tag-tipo">${h.tipo}</span>`      : ''}
      </div>
      <div class="rv-meta">
        ${h.duracion   ? `<div class="rv-meta-item"><span class="meta-key">Duración</span><span class="meta-val">⏱ ${h.duracion} min</span></div>` : ''}
        ${h.dificultad ? `<div class="rv-meta-item"><span class="meta-key">Dificultad</span><span class="meta-val ${dc(h.dificultad)}">⚠ ${h.dificultad}</span></div>` : ''}
      </div>
      <div class="rv-scores">
        ${h.rating     ? `<span class="rv-score-pill rv-score-escapistas">Escapistas ★ ${h.rating}</span>` : ''}
        ${h.valoracion ? `<span class="rv-score-pill rv-score-grupo">Grupo ★ ${h.valoracion}/10</span>`    : ''}
        ${commPill}
      </div>
      ${voteWidget(slug)}
    </div>

    <div class="rv-opinion">
      <div class="rv-opinion-label">Opinión personal</div>
      <div class="rv-opinion-text ${!h.descripcion ? 'empty' : ''}">
        ${h.descripcion || 'Sin descripción añadida aún.'}
      </div>
      ${(h.historia || h.ambientacion || h.jugabilidad || h.gamemaster) ? `
      <div class="rv-opinion-label" style="margin-top:12px">Valoración por categorías</div>
      <div class="rv-cats">
        ${catStars('Historia',     h.historia)}
        ${catStars('Ambientación', h.ambientacion)}
        ${catStars('Jugabilidad',  h.jugabilidad)}
        ${catStars('Game Master',  h.gamemaster)}
      </div>` : ''}
      ${h.web ? `<a class="rv-web" href="${h.web}" target="_blank">Ver web</a>` : ''}
    </div>

  </div>`;
}

// ── Renders principales ───────────────────────────────────────────────────────
function renderPendientes() {
  const s = document.getElementById('search-pend').value.toLowerCase();
  const c = document.getElementById('filter-ciudad-pend').value;
  const d = document.getElementById('filter-dif-pend').value;
  const t = document.getElementById('filter-tipo-pend').value;
  let f = PENDIENTES.filter(p => {
    if (s && ![p.nombre,p.empresa,p.tematica].some(x=>(x||'').toLowerCase().includes(s))) return false;
    if (c && p.ciudad !== c) return false;
    if (d && p.dificultad !== d) return false;
    if (t && p.tipo !== t) return false;
    if (showOnlyFavs && !iLiked(slugify(p.nombre))) return false;
    return true;
  });
  if      (sortPend==='rating') f.sort((a,b)=>(parseFloat(b.rating)||0)-(parseFloat(a.rating)||0));
  else if (sortPend==='name')   f.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  else if (sortPend==='dur')    f.sort((a,b)=>parseInt(b.duracion||0)-parseInt(a.duracion||0));
  else if (sortPend==='dif')    f.sort((a,b)=>do_(b.dificultad)-do_(a.dificultad));
  document.getElementById('result-info-pend').textContent = `Mostrando ${f.length} de ${PENDIENTES.length} escape rooms${showOnlyFavs ? ' · solo favoritos' : ''}`;
  const g = document.getElementById('grid-pendientes');
  g.innerHTML = f.length ? f.map(cardPend).join('') : `<div class="empty-state"><div class="lock">🔒</div><p>${showOnlyFavs ? 'NO HAY FAVORITOS AÚN — PULSA ♥ EN UNA TARJETA' : 'NO SE ENCONTRARON RESULTADOS'}</p></div>`;
}

function renderHechos() {
  const s = document.getElementById('search-hecho').value.toLowerCase();
  const d = document.getElementById('filter-dif-hecho').value;
  let f = HECHOS.filter(h => {
    if (s && ![h.nombre,h.empresa].some(x=>(x||'').toLowerCase().includes(s))) return false;
    if (d && h.dificultad !== d) return false;
    return true;
  });

  // Ordenar por nota media de comunidad (Firebase), fallback 0 si sin votos
  f.sort((a, b) => {
    const avgA = voteStats(slugify(a.nombre)).avg || 0;
    const avgB = voteStats(slugify(b.nombre)).avg || 0;
    return avgB - avgA;
  });

  document.getElementById('result-info-hecho').textContent = `${f.length} escape rooms completados`;
  document.getElementById('grid-hechos').innerHTML = f.map((h, i) => cardHecho(h, i + 1)).join('');
}

function renderRanking() {
  // Ordenar por Valoración Grupo del Excel (con decimales: 9.2, 8.5...)
  const s = [...HECHOS].sort((a, b) => parseFloat(b.valoracion || 0) - parseFloat(a.valoracion || 0));
  const medals = ['gold','silver','bronze'], emoji = ['🥇','🥈','🥉'];
  document.getElementById('ranking-table').innerHTML = `
    <thead><tr>
      <th>#</th><th>Escape Room</th><th>Empresa</th><th>Temática</th>
      <th>Dificultad</th><th>⏱ Min</th><th>★ Escapistas</th><th>★ Grupo</th>
      ${FIREBASE_ENABLED ? '<th>🗳 Comunidad</th>' : ''}
    </tr></thead>
    <tbody>${s.map((h, i) => {
      const slug = slugify(h.nombre);
      const { avg, count } = voteStats(slug);
      const commCell = FIREBASE_ENABLED
        ? `<td style="font-family:'Share Tech Mono',monospace;font-size:.82rem;">
            ${count > 0
              ? `<span style="color:var(--amber);font-family:'Cinzel',serif;font-size:.95rem;">★ ${(avg*2).toFixed(1)}</span>
                 <span style="color:var(--text3);font-size:.68rem;margin-left:4px;">(${count})</span>`
              : `<span style="color:var(--text3);font-size:.68rem;">—</span>`
            }
          </td>`
        : '';
      return `<tr>
        <td><span class="rank-pos ${medals[i]||''}">${emoji[i]||'#'+(i+1)}</span></td>
        <td style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--text)">${h.nombre}</td>
        <td>${h.empresa}</td>
        <td><span class="tag tag-tema" style="font-size:.7rem">${h.tematica}</span></td>
        <td><span class="meta-val ${dc(h.dificultad)}" style="font-size:.82rem">⚠ ${h.dificultad}</span></td>
        <td>${h.duracion}</td>
        <td>★ ${h.rating}</td>
        <td style="font-family:'Cinzel',serif;color:var(--amber);font-size:1rem">★ ${h.valoracion}</td>
        ${commCell}
      </tr>`;
    }).join('')}</tbody>`;
}
</script>
</body>
</html>
